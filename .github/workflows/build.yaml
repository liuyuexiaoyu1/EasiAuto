name: Build and Release

on:
  push: {}
  # 允许手动触发 Release，并接收外部输入
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: '版本号'
        required: true
      release_desc:
        type: string
        description: '更新描述'
        required: false
        default: '通过CI构建进行的手动发版'
      confirm-required:
        type: boolean
        description: "更新前是否需要确认"
        required: false
        default: false
      highlights_json:
        type: string
        description: "亮点更新（json）"
        required: false
      others_json:
        type: string
        description: "其他更新（json）"
        required: false

jobs:
  # --- 任务 1：构建 ---
  build:
    name: Build (${{ matrix.build_type }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [full, lite]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install Dependencies
        run: uv sync

      - name: Build and Zip
        run: uv run python tools/build.py --type ${{ matrix.build_type }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          # 使用 Tag 名或触发 ID，确保 Release 任务能找到对应的构建产物
          name: EasiAuto_${{ github.ref_name }}${{ matrix.build_type == 'lite' && '_lite' || '' }}
          path: build/*.zip
          if-no-files-found: error

  # --- 任务 2：发版 ---
  # 仅在手动触发 (workflow_dispatch) 时执行
  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: EasiAuto_${{ github.ref_name }}*
          path: release-dist
          merge-multiple: true

      - name: Check Version Type
        id: check_version
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [[ "$TAG_NAME" =~ [0-9]+(\.[0-9]+)*([ab]|rc|alpha|beta)[0-9]* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "🚀 Detected Pre-release version"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "✨ Detected Stable version"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_desc }}
          files: release-dist/*.zip
          draft: false
          prerelease: ${{ steps.check_version.outputs.IS_PRERELEASE == 'true' }}

      - name: Update Manifest
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          uv run python -m tools.distribution_center update-manifest \
            --version "${{ github.event.inputs.version }}" \
            --is-dev ${{ steps.check_version.outputs.IS_PRERELEASE }} \
            --confirm-required ${{ github.event.inputs.confirm-required }} \
            --desc "${{ github.event.inputs.release_desc }}" \
            --highlights '${{ github.event.inputs.highlights_json }}' \
            --others '${{ github.event.inputs.others_json }}' \
            --dist-dir release-dist
